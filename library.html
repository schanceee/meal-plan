<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Library</title>
  <script src="auth-guard.js"></script>
  <link rel="stylesheet" href="style.css">
  <script src="recipes.js"></script>
  <script src="nav.js"></script>
</head>
<body>

<div class="saved-page-hero">
  <h1>Recipe Library</h1>
  <p class="saved-page-sub" id="libSubtitle">&nbsp;</p>
</div>

<div class="container">

  <div class="lib-toolbar">
    <input id="libSearch" type="search" placeholder="Search name, ingredient, tag&hellip;"
      oninput="_libQ=this.value;renderLibrary()"
      style="flex:1;min-width:160px;border:1px solid var(--border);border-radius:8px;
             padding:9px 12px;font-family:Georgia,serif;font-size:14px;color:var(--text);">
    <div class="lib-filters">
      <button class="lib-filter active" onclick="setFilter('all',this)">All</button>
      <button class="lib-filter" onclick="setFilter('weekly',this)">This week</button>
      <button class="lib-filter" onclick="setFilter('saved',this)">Saved</button>
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0;">
      <button class="btn btn-outline" onclick="openCookidoo()" title="Browse Cookidoo recipes" style="font-size:13px;">&#127859; Cookidoo</button>
      <button class="btn btn-teal" onclick="openAddRecipe()">+ Add recipe</button>
      <button class="lib-settings-btn" onclick="openApiSettings()" title="API key settings">&#9881;</button>
    </div>
  </div>

  <div class="lib-cat-bar" id="libCatBar">
    <button class="lib-filter active" onclick="setCatFilter('all',this)">All types</button>
    <button class="lib-filter" onclick="setCatFilter('starter',this)">Starters</button>
    <button class="lib-filter" onclick="setCatFilter('main',this)">Mains</button>
    <button class="lib-filter" onclick="setCatFilter('side',this)">Sides</button>
  </div>

  <div id="libraryGrid"></div>

</div>

<!-- ── Recipe detail modal ──────────────────────────────────────── -->
<div id="detailModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeDetail()">
  <div class="modal-box" style="max-width:600px;max-height:92vh;overflow-y:auto;">
    <div id="detailContent"></div>
    <div class="modal-actions" style="margin-top:16px;" id="detailActions"></div>
  </div>
</div>

<!-- ── Cookidoo browser modal ───────────────────────────────────── -->
<div id="ckModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)ckClose()">
  <div class="modal-box" style="max-width:660px;max-height:92vh;overflow-y:auto;">
    <div class="modal-label">Browse Cookidoo</div>

    <!-- Step 1: login -->
    <div id="ckStep1">
      <p style="font-size:13px;color:var(--muted);font-family:sans-serif;margin-top:4px;line-height:1.5;">
        Sign in with your Cookidoo account to browse your collections and import recipes.
      </p>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:14px;">
        <div>
          <div class="modal-label" style="margin-bottom:4px;">Country / language</div>
          <select id="ckLocale" style="width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-family:Georgia,serif;font-size:14px;color:var(--text);box-sizing:border-box;"></select>
        </div>
        <div>
          <div class="modal-label" style="margin-bottom:4px;">Cookidoo email</div>
          <input id="ckEmail" type="email" placeholder="your@email.com" style="width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-family:Georgia,serif;font-size:14px;color:var(--text);box-sizing:border-box;">
        </div>
        <div>
          <div class="modal-label" style="margin-bottom:4px;">Password</div>
          <input id="ckPass" type="password" placeholder="Your Cookidoo password"
            onkeydown="if(event.key==='Enter')ckLogin()"
            style="width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-family:Georgia,serif;font-size:14px;color:var(--text);box-sizing:border-box;">
        </div>
      </div>
      <div id="ckErr" style="display:none;color:#c0392b;font-size:13px;font-family:sans-serif;margin-top:8px;line-height:1.5;"></div>
      <div class="modal-actions" style="margin-top:16px;">
        <button class="btn btn-outline" onclick="ckClose()">Cancel</button>
        <button id="ckLoginBtn" class="btn btn-teal" onclick="ckLogin()">Log in</button>
      </div>
    </div>

    <!-- Step 2: browse collections -->
    <div id="ckStep2" style="display:none">
      <div style="display:flex;align-items:center;gap:8px;margin-top:10px;margin-bottom:8px;flex-wrap:wrap;">
        <input id="ckSearch" type="search" placeholder="Filter recipes&hellip;"
          oninput="_ckFilterRecipes(this.value)"
          style="flex:1;min-width:0;border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-family:Georgia,serif;font-size:13px;color:var(--text);box-sizing:border-box;">
        <button class="btn btn-outline" style="font-size:12px;padding:6px 12px;" onclick="_ck.collections=[];_ck.selected={};_ckShowStep(1);document.getElementById('ckPass').value='';">&larr; Switch account</button>
      </div>
      <div id="ckBrowseContent" style="max-height:50vh;overflow-y:auto;border:1px solid var(--border);border-radius:8px;"></div>
      <div class="modal-actions" style="margin-top:12px;">
        <button class="btn btn-outline" onclick="ckClose()">Close</button>
        <button id="ckImportBtn" class="btn btn-teal" onclick="ckImport()" disabled>Select recipes to import</button>
      </div>
    </div>

    <!-- Step 3: importing progress -->
    <div id="ckStep3" style="display:none;padding:20px 0;">
      <div style="font-size:14px;font-family:sans-serif;margin-bottom:10px;" id="ckProgressLabel">Importing recipes&hellip;</div>
      <div style="font-size:28px;font-weight:300;font-family:'Helvetica Neue',sans-serif;color:var(--teal);" id="ckProgress">0 / 0</div>
      <button id="ckDoneBtn" class="btn btn-teal" style="display:none;margin-top:20px;" onclick="ckClose();renderLibrary()">Done &mdash; view in library</button>
    </div>
  </div>
</div>

<script>
// ── Weekly plan recipe metadata ─────────────────────────────────
var WEEKLY = [
  { id:'pasta-miso',         name:'Pasta caramelized onions \xb7 miso \xb7 Gruy\xe8re \xb7 sage',          day:'Monday \xb7 Dinner',    tags:['vegetarian','miso'],   color:'var(--green)', category:'main'    },
  { id:'bol-cereales',       name:'Grain bowl \xb7 roasted veg \xb7 lentils \xb7 tahini-tamari',            day:'Tuesday \xb7 Dinner',   tags:['vegetarian','tamari'], color:'var(--green)', category:'main'    },
  { id:'poulet-chou-savoie', name:'Braised chicken \xb7 Savoy cabbage \xb7 mustard',                        day:'Wednesday \xb7 Dinner', tags:['meat'],                color:'var(--red)',   category:'main'    },
  { id:'dal-lentilles',      name:'Lentil Dal \xb7 cumin tadka \xb7 kefir \xb7 rice',                       day:'Thursday \xb7 Dinner',  tags:['vegetarian','kefir'],  color:'var(--green)', category:'main'    },
  { id:'perche-lac',         name:'Lake perch \xb7 wild garlic butter \xb7 spinach \xb7 potatoes',          day:'Friday \xb7 Dinner',    tags:['fish'],                color:'var(--blue)',  category:'main'    },
  { id:'salade-betteraves',  name:'Warm beet salad \xb7 lentils \xb7 farro \xb7 goat cheese',               day:'Saturday \xb7 Lunch',   tags:['vegetarian'],          color:'var(--green)', category:'main'    },
  { id:'shakshuka',          name:'Spiced Shakshuka \xb7 roasted peppers \xb7 feta',                        day:'Saturday \xb7 Dinner',  tags:['vegetarian'],          color:'var(--green)', category:'main'    },
  { id:'tarte-poireaux',     name:'Thin leek tart \xb7 Gruy\xe8re \xb7 cr\xe8me fra\xeeche',                day:'Sunday \xb7 Lunch',     tags:['vegetarian'],          color:'var(--green)', category:'main'    },
  { id:'veloute-choufleur',  name:'Cauliflower velout\xe9 \xb7 miso \xb7 hazelnuts \xb7 goat cheese toast', day:'Sunday \xb7 Dinner',    tags:['vegetarian','miso'],   color:'var(--green)', category:'starter' },
  { id:'soupe-miso',         name:'Miso soup \xb7 leek \xb7 wakame \xb7 silken tofu',                       day:'Starter A',             tags:['vegetarian','miso'],   color:'var(--teal)',  category:'starter' },
  { id:'salade-mache',       name:"Lamb's lettuce salad \xb7 radishes \xb7 cider-mustard dressing",         day:'Starter B',             tags:['vegetarian'],          color:'var(--teal)',  category:'starter' },
  { id:'potage-carotte',     name:'Carrot soup \xb7 ginger \xb7 coconut milk \xb7 coriander',               day:'Starter C',             tags:['vegetarian'],          color:'var(--teal)',  category:'starter' }
];

// ── Built-in recipe photos (Unsplash) ───────────────────────────
var WEEKLY_PHOTOS = {
  'pasta-miso':         'https://images.unsplash.com/photo-1555949258-eb67b1ef0ceb?auto=format&fit=crop&w=400&h=200&q=75',
  'bol-cereales':       'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=400&h=200&q=75',
  'poulet-chou-savoie': 'https://images.unsplash.com/photo-1598103442097-8b74394b95c3?auto=format&fit=crop&w=400&h=200&q=75',
  'dal-lentilles':      'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=400&h=200&q=75',
  'perche-lac':         'https://images.unsplash.com/photo-1467003909585-2f8a72700288?auto=format&fit=crop&w=400&h=200&q=75',
  'salade-betteraves':  'https://images.unsplash.com/photo-1546549032-9571cd6b27df?auto=format&fit=crop&w=400&h=200&q=75',
  'shakshuka':          'https://images.unsplash.com/photo-1590947132387-155cc02f3212?auto=format&fit=crop&w=400&h=200&q=75',
  'tarte-poireaux':     'https://images.unsplash.com/photo-1574484284002-952d92456975?auto=format&fit=crop&w=400&h=200&q=75',
  'veloute-choufleur':  'https://images.unsplash.com/photo-1547592180-85f173990554?auto=format&fit=crop&w=400&h=200&q=75',
  'soupe-miso':         'https://images.unsplash.com/photo-1548943487-a2e4e43b4853?auto=format&fit=crop&w=400&h=200&q=75',
  'salade-mache':       'https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?auto=format&fit=crop&w=400&h=200&q=75',
  'potage-carotte':     'https://images.unsplash.com/photo-1476718406966-408be26d75aa?auto=format&fit=crop&w=400&h=200&q=75'
};

// ── State ───────────────────────────────────────────────────────
var _libQ = '';
var _libFilter = 'all';
var _libCatFilter = 'all';

// ── Render ──────────────────────────────────────────────────────
function renderLibrary() {
  var q = _libQ.toLowerCase().trim();

  // Only truly custom recipes (user-added), not WEEKLY_DB overrides
  var allCustom = Object.entries(getAll())
    .filter(function(e){ return e[1] && e[1].custom; })
    .map(function(e){ return Object.assign({ id: e[0] }, e[1]); });

  // WEEKLY_DB recipes to show
  var weeklyShown = [];
  if (_libFilter !== 'saved') {
    weeklyShown = WEEKLY.filter(function(r) {
      var rec = get(r.id);
      if (rec.hidden) return false;
      if (_libFilter === 'weekly') {
        if (_libCatFilter !== 'all' && (rec.category || r.category) !== _libCatFilter) return false;
        if (!q) return true;
        return (rec.name || r.name).toLowerCase().includes(q) || (rec.tags || r.tags).some(function(t){ return t.includes(q); });
      }
      // 'all' filter
      if (_libCatFilter !== 'all' && (rec.category || r.category) !== _libCatFilter) return false;
      if (!q) return true;
      return (rec.name || r.name).toLowerCase().includes(q) || (rec.category || r.category || '').includes(q) ||
             (rec.tags || r.tags).some(function(t){ return t.includes(q); });
    });
  } else {
    // 'saved' filter: only WEEKLY recipes the user liked
    weeklyShown = WEEKLY.filter(function(r) {
      var rec = get(r.id);
      if (rec.hidden || !rec.saved) return false;
      if (_libCatFilter !== 'all' && (rec.category || r.category) !== _libCatFilter) return false;
      if (!q) return true;
      return (rec.name || r.name).toLowerCase().includes(q) || (rec.tags || r.tags).some(function(t){ return t.includes(q); });
    });
  }

  // Custom recipes to show
  var customShown = [];
  if (_libFilter !== 'weekly') {
    var baseCustom = _libFilter === 'saved' ? allCustom.filter(function(r){ return r.saved; }) : allCustom;
    customShown = baseCustom.filter(function(r) {
      if (_libCatFilter !== 'all' && (r.category || 'main') !== _libCatFilter) return false;
      if (!q) return true;
      var n = (r.name||'').toLowerCase();
      var d = (r.description||'').toLowerCase();
      var tg = (r.tags||[]).some(function(t){ return t.toLowerCase().includes(q); });
      var ig = (r.ingredients||[]).some(function(i){ return i.toLowerCase().includes(q); });
      return n.includes(q) || d.includes(q) || tg || ig;
    });
  }

  var total = weeklyShown.length + customShown.length;
  document.getElementById('libSubtitle').textContent =
    total + ' recipe' + (total !== 1 ? 's' : '') +
    (q ? ' matching \u201c' + _libQ + '\u201d' : '');

  if (!total) {
    document.getElementById('libraryGrid').innerHTML =
      '<p style="color:var(--muted);font-size:14px;padding:32px 0;">' +
      (q ? 'No recipes match your search.' : 'No recipes yet. Import one or add manually.') + '</p>';
    return;
  }

  var html = '<div class="recipe-grid" style="margin-top:24px;">';

  weeklyShown.forEach(function(r) {
    var rec = get(r.id);
    html += recipeCard({
      id: r.id,
      name: rec.name || r.name,
      sub: r.day,
      tags: rec.tags || r.tags,
      category: rec.category || r.category,
      rating: rec.rating || 0,
      note: rec.note || '',
      saved: !!rec.saved,
      color: r.color,
      href: 'recettes/' + r.id + '.html',
      photoUrl: rec.photoUrl || WEEKLY_PHOTOS[r.id] || null
    });
  });

  customShown.forEach(function(r) {
    html += recipeCard({
      id: r.id,
      name: r.name || 'Untitled',
      sub: '',
      tags: r.tags || [],
      rating: r.rating || 0,
      note: r.note || '',
      saved: !!r.saved,
      color: 'var(--teal)',
      href: null,
      category: r.category || 'main',
      servings: r.servings,
      prepTime: r.prepTime,
      cookTime: r.cookTime,
      photoUrl: r.photoUrl || null
    });
  });

  html += '</div>';
  document.getElementById('libraryGrid').innerHTML = html;
}

function recipeCard(o) {
  var currentRating = o.rating || 0;
  var savedState = !!o.saved;

  // Tags with type-appropriate pill colors
  var tagsHtml = (o.tags || []).slice(0, 3).map(function(t) {
    var tl = t.toLowerCase();
    var cls = tl === 'vegetarian' ? 'pill pill-v'
            : (tl === 'fish' || tl === 'pescatarian') ? 'pill pill-p'
            : (tl === 'meat' || tl === 'chicken') ? 'pill pill-m'
            : 'pill pill-prep';
    return '<span class="' + cls + '">' + t.charAt(0).toUpperCase() + t.slice(1) + '</span>';
  }).join('');

  // Category badge
  var catBadge = (o.category && o.category !== 'main')
    ? '<span class="lib-cat-badge lib-cat-' + o.category + '">' + o.category.charAt(0).toUpperCase() + o.category.slice(1) + '</span>'
    : '';

  // Interactive star rating
  var starsHtml = [1,2,3,4,5].map(function(n) {
    return '<span class="rc-star' + (n <= currentRating ? ' on' : '') + '" ' +
      'onclick="event.stopPropagation();setRating(\'' + o.id + '\',' + n + ')">' +
      (n <= currentRating ? '\u2605' : '\u2606') + '</span>';
  }).join('');

  // Description (custom recipes)
  var descHtml = o.description
    ? '<div class="rc-desc">' + o.description.substring(0, 90) + (o.description.length > 90 ? '\u2026' : '') + '</div>'
    : '';

  // Meta line (servings/prep/cook for custom)
  var metaParts = [];
  if (o.servings) metaParts.push(o.servings);
  if (o.prepTime) metaParts.push('Prep ' + o.prepTime);
  if (o.cookTime) metaParts.push('Cook ' + o.cookTime);
  var metaHtml = metaParts.length
    ? '<div class="rc-desc">' + metaParts.join(' \u00b7 ') + '</div>'
    : '';

  // Footer: tags + category badge + recipe link
  var footer =
    '<div class="rc-footer">' +
      tagsHtml +
      (catBadge ? catBadge : '') +
      (o.href ? '<span class="rc-link">Recipe \u2192</span>' : '') +
    '</div>';

  // Actions row: stars, note, edit, delete, like
  var actionsHtml =
    '<div class="rc-actions" onclick="event.stopPropagation()">' +
      '<div class="rc-stars">' + starsHtml + '</div>' +
      '<button class="rc-action-btn' + (o.note ? ' has-note' : '') + '" onclick="editNote(\'' + o.id + '\')">\u270e Note</button>' +
      '<button class="rc-action-btn" onclick="openEditForm(\'' + o.id + '\')">Edit</button>' +
      '<button class="rc-action-btn" style="color:var(--red)" onclick="deleteRecipeLib(\'' + o.id + '\')">Delete</button>' +
      '<button class="rc-save-btn' + (savedState ? ' saved' : '') + '" onclick="toggleLike(\'' + o.id + '\')">' + (savedState ? '\u2665' : '\u2661') + '</button>' +
    '</div>';

  // Header: photo with colored fallback, or plain colored bar
  var headerHtml = o.photoUrl
    ? '<div class="rc-photo-wrap" style="background:' + o.color + ';">' +
      '<img src="' + o.photoUrl + '" alt="" ' +
      'onerror="this.parentNode.className=\'rc-header\';this.parentNode.style.height=\'6px\';this.parentNode.style.background=\'' + o.color + '\';this.remove()">' +
      '</div>'
    : '<div class="rc-header" style="background:' + o.color + '"></div>';

  var inner =
    headerHtml +
    '<div class="rc-body">' +
      (o.sub ? '<div class="rc-day">' + o.sub + '</div>' : '') +
      '<div class="rc-name">' + o.name + '</div>' +
      descHtml + metaHtml +
      footer +
      actionsHtml +
    '</div>';

  return o.href
    ? '<a class="recipe-card" href="' + o.href + '">' + inner + '</a>'
    : '<div class="recipe-card" onclick="openDetail(\'' + o.id + '\')">' + inner + '</div>';
}

function setFilter(f, btn) {
  _libFilter = f;
  document.querySelectorAll('.lib-filters .lib-filter').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderLibrary();
}

function setCatFilter(f, btn) {
  _libCatFilter = f;
  document.querySelectorAll('#libCatBar .lib-filter').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderLibrary();
}

// ── Detail modal ─────────────────────────────────────────────────
function openDetail(id) {
  var r = get(id);
  if (!r || !r.name) return;

  var html = '';
  if (r.photoUrl) {
    html += '<img src="' + r.photoUrl + '" alt="" ' +
      'style="width:100%;height:200px;object-fit:cover;border-radius:8px;margin-bottom:16px;display:block;" ' +
      'onerror="this.style.display=\'none\'">';
  }
  html += '<div style="font-size:18px;font-weight:normal;margin-bottom:8px;">' + r.name + '</div>';
  if (r.description) html += '<p style="font-size:14px;color:var(--muted);margin-bottom:12px;">' + r.description + '</p>';

  var meta = [];
  if (r.servings)  meta.push('<strong>Servings:</strong> ' + r.servings);
  if (r.prepTime)  meta.push('<strong>Prep:</strong> ' + r.prepTime);
  if (r.cookTime)  meta.push('<strong>Cook:</strong> ' + r.cookTime);
  if (meta.length) html += '<p style="font-size:13px;font-family:sans-serif;margin-bottom:12px;">' + meta.join(' &middot; ') + '</p>';

  if (r.tags && r.tags.length) {
    html += '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px;">' +
      r.tags.map(function(t){ return '<span class="pill pill-prep">' + t + '</span>'; }).join('') + '</div>';
  }

  if (r.ingredients && r.ingredients.length) {
    html += '<div class="modal-label" style="margin-bottom:8px;">Ingredients</div>' +
      '<ul style="list-style:none;margin-bottom:16px;">' +
      r.ingredients.map(function(i){
        return '<li style="padding:5px 0;border-bottom:1px solid var(--border);font-size:14px;">' + i + '</li>';
      }).join('') + '</ul>';
  }

  if (r.instructions && r.instructions.length) {
    html += '<div class="modal-label" style="margin-bottom:8px;">Instructions</div><ol style="list-style:none;margin-bottom:16px;">';
    r.instructions.forEach(function(step, i) {
      html += '<li style="padding:10px 0 10px 44px;position:relative;border-bottom:1px solid var(--border);font-size:14px;line-height:1.6;">' +
        '<span style="position:absolute;left:0;top:10px;width:28px;height:28px;background:var(--green);color:white;' +
               'border-radius:50%;display:inline-flex;align-items:center;justify-content:center;' +
               'font-family:sans-serif;font-size:12px;font-weight:700;">' + (i+1) + '</span>' +
        step + '</li>';
    });
    html += '</ol>';
  }

  if (r.note) {
    html += '<div class="modal-label" style="margin-bottom:6px;">Your notes</div>' +
      '<p style="font-size:14px;color:var(--muted);font-style:italic;line-height:1.6;">' + r.note + '</p>';
  }

  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailActions').innerHTML =
    '<button class="btn btn-outline" onclick="closeDetail()">Close</button>' +
    '<button class="btn btn-outline" onclick="closeDetail();openEditForm(\'' + id + '\')">Edit</button>';

  document.getElementById('detailModal').style.display = 'flex';
}

function closeDetail() {
  document.getElementById('detailModal').style.display = 'none';
}

function toggleLike(id) {
  var rec = get(id);
  set(id, { saved: !rec.saved });
  window._updateGlobalBar && window._updateGlobalBar();
  renderLibrary();
}

function setRating(id, n) {
  var rec = get(id);
  set(id, { rating: rec.rating === n ? 0 : n });
  renderLibrary();
}

function editNote(id) {
  var rec = get(id);
  var current = rec.note || '';
  var newNote = prompt('Note for this recipe:', current);
  if (newNote !== null) {
    set(id, { note: newNote });
    renderLibrary();
  }
}

function deleteRecipeLib(id) {
  var w = WEEKLY.find(function(w){ return w.id === id; });
  var name = w ? (get(id).name || w.name) : (get(id).name || 'this recipe');
  if (confirm('Delete "' + name.substring(0,70) + '"? This cannot be undone.')) {
    if (w) {
      // Built-in recipe: mark hidden in localStorage
      set(id, { hidden: true });
    } else {
      remove(id);
    }
    window._updateGlobalBar && window._updateGlobalBar();
    renderLibrary();
  }
}

function openEditForm(id) {
  var w = WEEKLY.find(function(w){ return w.id === id; });
  if (w) {
    // Pre-populate localStorage with WEEKLY defaults if not yet overridden
    var existing = get(id);
    if (!existing.name) {
      set(id, { name: w.name, category: w.category || 'main', tags: w.tags || [] });
    }
  }
  openEditRecipe(id);
}

// ── Keyboard shortcuts ────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closeDetail(); }
});

// ── Hook for nav.js actions (e.g. rating from global bar) ─────────
window._onNavAction = function() { renderLibrary(); };

// ──────────────────────────────────────────────────────────────────
// COOKIDOO BROWSER
// ──────────────────────────────────────────────────────────────────

var _ck = { token: null, cc: 'ch', lang: 'de-CH', collections: [], selected: {} };

// Country / language options for the login form
var CK_LOCALES = [
  { label: 'Switzerland (DE)', cc: 'ch', lang: 'de-CH' },
  { label: 'Switzerland (FR)', cc: 'ch', lang: 'fr-CH' },
  { label: 'Switzerland (IT)', cc: 'ch', lang: 'it-CH' },
  { label: 'Switzerland (EN)', cc: 'ch', lang: 'en' },
  { label: 'France',           cc: 'fr', lang: 'fr-FR' },
  { label: 'Germany',          cc: 'de', lang: 'de-DE' },
  { label: 'Austria',          cc: 'at', lang: 'de-AT' },
  { label: 'UK',               cc: 'gb', lang: 'en-GB' },
  { label: 'USA',              cc: 'us', lang: 'en-US' },
  { label: 'Belgium (FR)',     cc: 'be', lang: 'fr-BE' },
  { label: 'Belgium (NL)',     cc: 'be', lang: 'nl-BE' },
];

// Base API URL
function _ckBase() { return 'https://' + _ck.cc + '.tmmobile.vorwerk-digital.com'; }

// Format a QuantityJSON + unitNotation + ingredientNotation into a string
function _ckFmtIngredient(ing) {
  var q = ing.quantity || {};
  var qty = q.value != null ? ('' + q.value) : (q.from != null ? q.from + '-' + q.to : '');
  return [qty, ing.unitNotation || '', ing.ingredientNotation || ''].filter(Boolean).join(' ').trim();
}

// Format seconds to "Xh Ymin"
function _ckFmtTime(seconds) {
  if (!seconds) return '';
  var h = Math.floor(seconds / 3600), m = Math.floor((seconds % 3600) / 60);
  return (h ? h + 'h ' : '') + (m ? m + ' min' : '');
}

// Strip HTML tags
function _ckStrip(s) { return (s || '').replace(/<[^>]+>/g, ' ').replace(/\s+/g,' ').trim(); }

// Proxy-fetch a URL as GET with Authorization header forwarded via URL mangling
// Note: allorigins supports custom request headers via the raw endpoint
function _ckProxyGet(url, token) {
  // Try direct first (works if CORS is permissive), fall back to proxies
  return fetch(url, { headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/json' } })
    .catch(function() {
      return fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(url))
        .then(function(r) { return r.json().then(function(d) { return { ok: true, _raw: d.contents }; }); });
    })
    .then(function(r) {
      if (r._raw !== undefined) return JSON.parse(r._raw);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    });
}

function _ckProxyGetAccept(url, token, accept) {
  return fetch(url, { headers: { 'Authorization': 'Bearer ' + token, 'Accept': accept } })
    .catch(function() {
      // For managed/custom collections the Accept header matters; try without accept via proxy
      return fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(url))
        .then(function(r) { return r.json().then(function(d) { return { ok: true, _raw: d.contents }; }); });
    })
    .then(function(r) {
      if (r._raw !== undefined) return JSON.parse(r._raw);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    });
}

function openCookidoo() {
  // Populate locale selector
  var sel = document.getElementById('ckLocale');
  if (sel && !sel.options.length) {
    CK_LOCALES.forEach(function(l, i) {
      var o = new Option(l.label, i);
      sel.add(o);
    });
  }
  _ckShowStep(1);
  document.getElementById('ckModal').style.display = 'flex';
  setTimeout(function() { document.getElementById('ckEmail').focus(); }, 80);
}

function _ckShowStep(n) {
  document.getElementById('ckStep1').style.display = n === 1 ? '' : 'none';
  document.getElementById('ckStep2').style.display = n === 2 ? '' : 'none';
  document.getElementById('ckStep3').style.display = n === 3 ? '' : 'none';
}

function _ckErr(msg) {
  var el = document.getElementById('ckErr');
  el.textContent = msg; el.style.display = msg ? 'block' : 'none';
}

window.ckLogin = function() {
  var idx = parseInt(document.getElementById('ckLocale').value);
  var loc = CK_LOCALES[idx] || CK_LOCALES[0];
  _ck.cc = loc.cc; _ck.lang = loc.lang;
  var email = document.getElementById('ckEmail').value.trim();
  var pass  = document.getElementById('ckPass').value;
  if (!email || !pass) { _ckErr('Please enter your Cookidoo email and password.'); return; }

  var btn = document.getElementById('ckLoginBtn');
  btn.textContent = 'Logging in\u2026'; btn.disabled = true;
  _ckErr('');

  var tokenUrl = _ckBase() + '/ciam/auth/token';
  var body = 'grant_type=password&username=' + encodeURIComponent(email) + '&password=' + encodeURIComponent(pass);

  fetch(tokenUrl, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/x-www-form-urlencoded',
      'Authorization': 'Basic a3VwZmVyd2Vyay1jbGllbnQtbndvdDpMczUwT04xd295U3FzMWRDZEpnZQ==',
      'Accept': 'application/json'
    },
    body: body
  })
  .then(function(r) {
    if (r.status === 401 || r.status === 403) throw new Error('invalid_credentials');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(function(data) {
    _ck.token = data.access_token;
    _ckLoadCollections();
  })
  .catch(function(err) {
    var msg = err.message === 'invalid_credentials'
      ? 'Invalid email or password.'
      : 'Could not reach Cookidoo (' + err.message + '). This feature requires a direct connection to Vorwerk\u2019s servers \u2014 try disabling your VPN if active.';
    _ckErr(msg);
  })
  .finally(function() { btn.textContent = 'Log in'; btn.disabled = false; });
};

function _ckLoadCollections() {
  _ckShowStep(2);
  document.getElementById('ckBrowseContent').innerHTML =
    '<div style="padding:30px;text-align:center;color:var(--muted);font-size:13px;font-family:sans-serif;">Loading your collections\u2026</div>';

  var lang = _ck.lang, token = _ck.token;
  var managedUrl = _ckBase() + '/organize/' + lang + '/api/managed-list';
  var customUrl  = _ckBase() + '/organize/' + lang + '/api/custom-list';

  Promise.all([
    _ckProxyGetAccept(managedUrl, token, 'application/vnd.vorwerk.organize.managed-list.mobile+json').catch(function(){ return []; }),
    _ckProxyGetAccept(customUrl,  token, 'application/vnd.vorwerk.organize.custom-list.mobile+json').catch(function(){ return []; })
  ])
  .then(function(results) {
    var managed = Array.isArray(results[0]) ? results[0] : [];
    var custom  = Array.isArray(results[1]) ? results[1] : [];
    _ck.collections = custom.concat(managed);
    _ck.selected = {};
    _ckRenderBrowser();
  })
  .catch(function(err) {
    document.getElementById('ckBrowseContent').innerHTML =
      '<div style="padding:20px;color:#c0392b;font-size:13px;font-family:sans-serif;">Could not load collections: ' + err.message + '</div>';
  });
}

function _ckRenderBrowser() {
  var collections = _ck.collections;
  if (!collections.length) {
    document.getElementById('ckBrowseContent').innerHTML =
      '<div style="padding:30px;text-align:center;color:var(--muted);font-size:13px;font-family:sans-serif;">No collections found in your Cookidoo account.</div>';
    _ckUpdateImportBtn();
    return;
  }

  var html = '';
  collections.forEach(function(col, ci) {
    var recipes = [];
    (col.chapters || []).forEach(function(ch) {
      (ch.recipes || []).forEach(function(r) { recipes.push(r); });
    });
    if (!recipes.length) return;
    var type = col.listType === 'MANAGEDLIST' ? ' <span style="font-size:9px;background:var(--teal-light);color:var(--teal);padding:1px 5px;border-radius:4px;font-family:sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.04em;">Cookidoo</span>' : '';
    html += '<div class="ck-col">' +
      '<div class="ck-col-hdr" onclick="_ckToggleCol(' + ci + ')">' +
        '<span class="ck-col-chevron" id="ckChev_' + ci + '">\u25bc</span>' +
        '<span class="ck-col-title">' + _ckEsc(col.title) + type + '</span>' +
        '<span class="ck-col-count">' + recipes.length + ' recipes</span>' +
        '<button class="ck-sel-all" onclick="event.stopPropagation();_ckSelectAll(' + ci + ')">Select all</button>' +
      '</div>' +
      '<div class="ck-col-body" id="ckColBody_' + ci + '">';
    recipes.forEach(function(r) {
      var mins = r.totalTime > 0 ? _ckFmtTime(r.totalTime) : '';
      html += '<label class="ck-recipe-row">' +
        '<input type="checkbox" class="ck-chk" data-id="' + r.id + '" data-ci="' + ci + '" onchange="_ckToggleSel(this)">' +
        '<span class="ck-recipe-name">' + _ckEsc(r.title) + '</span>' +
        (mins ? '<span class="ck-recipe-time">' + mins + '</span>' : '') +
      '</label>';
    });
    html += '</div></div>';
  });
  document.getElementById('ckBrowseContent').innerHTML = html || '<div style="padding:30px;text-align:center;color:var(--muted);font-size:13px;">No recipes found.</div>';
  _ckUpdateImportBtn();
}

function _ckToggleCol(ci) {
  var body = document.getElementById('ckColBody_' + ci);
  var chev = document.getElementById('ckChev_' + ci);
  if (!body) return;
  var open = body.style.display !== 'none';
  body.style.display = open ? 'none' : '';
  if (chev) chev.textContent = open ? '\u25b6' : '\u25bc';
}

function _ckSelectAll(ci) {
  var body = document.getElementById('ckColBody_' + ci);
  if (!body) return;
  var boxes = body.querySelectorAll('.ck-chk');
  var allChecked = Array.prototype.every.call(boxes, function(b){ return b.checked; });
  boxes.forEach(function(b) { b.checked = !allChecked; _ckToggleSel(b); });
}

function _ckToggleSel(chk) {
  if (chk.checked) _ck.selected[chk.dataset.id] = true;
  else delete _ck.selected[chk.dataset.id];
  _ckUpdateImportBtn();
}

function _ckUpdateImportBtn() {
  var n = Object.keys(_ck.selected).length;
  var btn = document.getElementById('ckImportBtn');
  if (!btn) return;
  btn.textContent = n > 0 ? 'Import ' + n + ' recipe' + (n !== 1 ? 's' : '') : 'Select recipes to import';
  btn.disabled = n === 0;
}

function _ckEsc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

window.ckImport = function() {
  var ids = Object.keys(_ck.selected);
  if (!ids.length) return;
  var btn = document.getElementById('ckImportBtn');
  btn.disabled = true;
  _ckShowStep(3);
  var done = 0, failed = 0;
  document.getElementById('ckProgress').textContent = '0 / ' + ids.length;

  var seq = Promise.resolve();
  ids.forEach(function(id) {
    seq = seq.then(function() {
      var url = _ckBase() + '/recipes/recipe/' + _ck.lang + '/' + id;
      return _ckProxyGet(url, _ck.token)
        .then(function(details) { _ckSaveRecipe(id, details); done++; })
        .catch(function() { failed++; })
        .finally(function() {
          document.getElementById('ckProgress').textContent = (done + failed) + ' / ' + ids.length;
        });
    });
  });

  seq.then(function() {
    document.getElementById('ckProgressLabel').textContent =
      done + ' recipe' + (done !== 1 ? 's' : '') + ' imported' + (failed ? ', ' + failed + ' failed' : '') + '.';
    document.getElementById('ckDoneBtn').style.display = 'inline-block';
    if (typeof renderLibrary === 'function') renderLibrary();
  });
};

function _ckSaveRecipe(id, d) {
  // Build ingredient list from all groups
  var ingredients = [];
  (d.recipeIngredientGroups || []).forEach(function(g) {
    (g.recipeIngredients || []).forEach(function(i) {
      var s = _ckFmtIngredient(i); if (s) ingredients.push(s);
    });
  });

  // Build instruction list from all step groups
  var instructions = [];
  (d.recipeStepGroups || []).forEach(function(sg) {
    (sg.recipeSteps || []).forEach(function(s) {
      var t = _ckStrip(s.formattedText || s.title || ''); if (t) instructions.push(t);
    });
  });

  // Times: ACTIVE_TIME = prep, TOTAL_TIME = total (use as cook)
  var prepSecs = 0, cookSecs = 0;
  (d.times || []).forEach(function(t) {
    var v = (t.quantity && t.quantity.value) || 0;
    if (t.type === 'ACTIVE_TIME') prepSecs = v;
    else if (t.type === 'TOTAL_TIME') cookSecs = v;
  });

  // Serving size
  var sv = d.servingSize || {};
  var svQty = (sv.quantity && sv.quantity.value) || '';
  var servings = svQty ? svQty + ' ' + (sv.unitNotation || 'servings') : '';

  // Tags from categories
  var tags = (d.categories || []).map(function(c){ return (c.title || '').toLowerCase(); }).filter(Boolean).slice(0, 5);

  // Description from additionalInformation
  var desc = '';
  (d.additionalInformation || []).forEach(function(ai) { if (!desc && ai.content) desc = _ckStrip(ai.content).slice(0, 200); });

  var newId = 'custom-' + Date.now() + '-' + Math.floor(Math.random() * 10000);
  set(newId, {
    saved: true, custom: true,
    name: (d.title || 'Untitled').trim(),
    description: desc,
    servings: servings,
    prepTime: _ckFmtTime(prepSecs),
    cookTime: _ckFmtTime(cookSecs),
    ingredients: ingredients,
    instructions: instructions,
    tags: tags,
    category: 'main',
    rating: 0, note: '',
    createdAt: Date.now(),
    sourceId: id,
    source: 'cookidoo'
  });
  if (window._syncRecipe) window._syncRecipe(newId, get(newId));
}

window.ckClose = function() {
  document.getElementById('ckModal').style.display = 'none';
};

function _ckFilterRecipes(q) {
  q = q.toLowerCase().trim();
  document.querySelectorAll('.ck-recipe-row').forEach(function(row) {
    var name = row.querySelector('.ck-recipe-name');
    row.style.display = (!q || (name && name.textContent.toLowerCase().includes(q))) ? '' : 'none';
  });
}

// ── Init ──────────────────────────────────────────────────────────
(function() {
  var params = new URLSearchParams(window.location.search);
  var q = params.get('q');
  if (q) { _libQ = q; document.getElementById('libSearch').value = q; }
  var id = params.get('id');
  if (id) {
    renderLibrary();
    openDetail(id);
    return;
  }
})();
renderLibrary();
</script>
