<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="../auth-guard.js"></script>
  <!-- Inject recipe-id meta BEFORE nav.js so injectRecipePageBar() finds it -->
  <script>
    (function () {
      var id = new URLSearchParams(location.search).get('id');
      if (id) {
        var m = document.createElement('meta');
        m.name = 'recipe-id';
        m.content = id;
        document.head.appendChild(m);
      }
    })();
  </script>
  <title>Recipe — Meal Plan</title>
  <link rel="stylesheet" href="../style.css">
  <script src="../recipes.js"></script>
</head>
<body>

<nav class="topnav">
  <a href="../library.html" onclick="if(window.history.length>1){event.preventDefault();history.back()}">← Back</a>
  <span class="sep">/</span>
  <span id="navRecipeName" style="color:rgba(255,255,255,0.6)">Recipe</span>
</nav>

<div id="recipeHero" class="recipe-hero">
  <div style="max-width:820px;margin:0 auto;">
    <div id="recipeTags" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;"></div>
    <h1 id="recipeTitle"></h1>
    <div class="recipe-meta" id="recipeMeta"></div>
  </div>
</div>

<div class="container-narrow">

  <div id="recipePhoto" style="display:none;margin-bottom:28px;">
    <img id="recipePhotoImg" src="" alt=""
      style="width:100%;max-height:340px;object-fit:cover;border-radius:10px;">
  </div>

  <div id="recipeDescription" style="display:none;margin-bottom:24px;">
    <p id="recipeDescText" style="font-size:15px;color:var(--muted);line-height:1.7;"></p>
  </div>

  <!-- Action bar injected here by nav.js (stars, note, save) -->

  <div class="bring-box" id="bringBox" style="display:none;">
    <div class="bring-info">
      <h3>Ingredients</h3>
      <p>Open on your iPhone and tap the Bring! button — or copy the list manually.</p>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-start;">
      <a id="bringLink" href="#" target="_blank" rel="noopener"
         style="display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:#fff;border:1.5px solid #e0e0e0;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600;color:#222;box-shadow:0 1px 3px rgba(0,0,0,.08);">
        <img src="https://www.getbring.com/static/images/logo-short.svg" alt="Bring!" style="height:22px;width:auto;" onerror="this.style.display='none'">
        Add to Bring!
      </a>
      <button class="btn btn-outline" onclick="copyIngredients()">Copy ingredients</button>
      <span class="copy-success" id="copyMsg">✓ Copied!</span>
    </div>
  </div>

  <div class="recipe-layout" id="recipeLayout">

    <div class="ingredients-box" id="ingredientsBox" style="display:none;">
      <h2>Ingredients<span id="servingsLabel"></span></h2>
      <ul id="ingredientsList"></ul>
    </div>

    <div class="instructions-box" id="instructionsBox" style="display:none;">
      <h2>Instructions</h2>
      <ol id="instructionsList"></ol>
    </div>

  </div>

  <div id="notFound" style="display:none;padding:60px 0;text-align:center;color:var(--muted);font-size:15px;">
    Recipe not found. It may have been deleted.
    <br><br>
    <a href="../library.html" style="color:var(--teal);">← Back to library</a>
  </div>

</div>

<script>
(function () {
  var id = new URLSearchParams(location.search).get('id');
  if (!id) { showNotFound(); return; }

  var r = get(id);
  if (!r || !r.name) { showNotFound(); return; }

  // Page title & nav label
  document.title = r.name + ' — Meal Plan';
  document.getElementById('navRecipeName').textContent = r.name;

  // Hero title
  document.getElementById('recipeTitle').textContent = r.name;

  // Tags
  var tagsEl = document.getElementById('recipeTags');
  (r.tags || []).forEach(function (t) {
    var tl = t.toLowerCase();
    var cls = tl === 'vegetarian' ? 'pill pill-v'
            : (tl === 'fish' || tl === 'pescatarian') ? 'pill pill-p'
            : (tl === 'meat' || tl === 'chicken') ? 'pill pill-m'
            : 'pill pill-f';
    var span = document.createElement('span');
    span.className = cls;
    span.textContent = t.charAt(0).toUpperCase() + t.slice(1);
    tagsEl.appendChild(span);
  });

  // Meta (servings / prep / cook)
  var metaEl = document.getElementById('recipeMeta');
  [
    { label: 'Servings', value: r.servings },
    { label: 'Prep',     value: r.prepTime },
    { label: 'Cook',     value: r.cookTime }
  ].forEach(function (m) {
    if (!m.value) return;
    var div = document.createElement('div');
    div.className = 'recipe-meta-item';
    div.innerHTML = '<strong>' + m.label + '</strong>' + m.value;
    metaEl.appendChild(div);
  });

  // Photo
  if (r.photoUrl) {
    document.getElementById('recipePhotoImg').src = r.photoUrl;
    document.getElementById('recipePhotoImg').onerror = function () {
      document.getElementById('recipePhoto').style.display = 'none';
    };
    document.getElementById('recipePhoto').style.display = 'block';
  }

  // Description
  if (r.description) {
    document.getElementById('recipeDescText').textContent = r.description;
    document.getElementById('recipeDescription').style.display = 'block';
  }

  // Ingredients
  var hasIngredients = r.ingredients && r.ingredients.length;
  if (hasIngredients) {
    if (r.servings) {
      document.getElementById('servingsLabel').textContent = ' — ' + r.servings;
    }
    var ul = document.getElementById('ingredientsList');
    r.ingredients.forEach(function (ing) {
      var li = document.createElement('li');
      li.textContent = ing;
      ul.appendChild(li);
    });
    document.getElementById('ingredientsBox').style.display = '';
    document.getElementById('bringBox').style.display = '';
  }

  // Instructions
  if (r.instructions && r.instructions.length) {
    var ol = document.getElementById('instructionsList');
    r.instructions.forEach(function (step) {
      var li = document.createElement('li');
      li.textContent = step;
      ol.appendChild(li);
    });
    document.getElementById('instructionsBox').style.display = '';
  }

  // Hide layout grid if nothing to show
  if (!hasIngredients && (!r.instructions || !r.instructions.length)) {
    document.getElementById('recipeLayout').style.display = 'none';
  }

  // Bring! deep link — routes through a Cloudflare Worker that serves JSON-LD
  // so Bring!'s server can read the ingredient list (it never sees JS-injected content).
  // Worker URL: https://bring-proxy.YOURNAME.workers.dev  (deploy bring-worker/worker.js)
  if (hasIngredients) {
    var BRING_WORKER = 'https://bring.edouardg.workers.dev';
    var workerUrl = BRING_WORKER
      + '?name=' + encodeURIComponent(r.name)
      + '&i='   + encodeURIComponent(r.ingredients.join('|'));
    var parserUrl   = 'https://api.getbring.com/rest/bringrecipes/parser?url=' + encodeURIComponent(workerUrl);
    var deepLinkVal = 'https://deeplink.getbring.com/import?type=RECIPE&src=' + btoa(parserUrl);
    var bringHref   = 'https://enjoy.getbring.com/ZAzR?deep_link_value=' + encodeURIComponent(deepLinkVal);
    document.getElementById('bringLink').href = bringHref;
  }

  // Copy ingredients helper
  window.copyIngredients = function () {
    var lines = [r.name, ''];
    (r.ingredients || []).forEach(function (i) { lines.push('- ' + i); });
    navigator.clipboard.writeText(lines.join('\n')).then(function () {
      var m = document.getElementById('copyMsg');
      m.style.display = 'inline';
      setTimeout(function () { m.style.display = 'none'; }, 2500);
    });
  };

  function showNotFound() {
    document.getElementById('recipeHero').style.display = 'none';
    document.getElementById('notFound').style.display = 'block';
  }
})();
</script>
<script src="../nav.js"></script>
</body>
</html>
