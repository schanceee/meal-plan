<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meal Plan</title>
  <link rel="stylesheet" href="style.css">
  <script src="recipes.js"></script>
  <script src="nav.js"></script>
</head>
<body>

<div class="dash-hero">
  <div class="dash-greeting" id="dashGreeting">Good evening</div>
  <div class="dash-date" id="dashDate"></div>
</div>

<div class="container" style="max-width:860px;padding-top:32px;padding-bottom:80px;">

  <!-- Today -->
  <div class="dash-section">
    <div class="dash-section-title">Today</div>
    <div id="dashToday"></div>
  </div>

  <!-- This week -->
  <div class="dash-section">
    <div class="dash-section-header">
      <div class="dash-section-title">This week</div>
      <a href="planner.html" class="dash-link">Edit in planner &rarr;</a>
    </div>
    <div id="dashWeek"></div>
  </div>

  <!-- Quick links -->
  <div class="dash-section">
    <div class="dash-section-title">Jump to</div>
    <div class="dash-actions">
      <a href="planner.html" class="dash-action-card">
        <div class="dash-action-label">Planner</div>
        <div class="dash-action-sub" id="dashPlannerSub">Build your week</div>
      </a>
      <a href="library.html" class="dash-action-card">
        <div class="dash-action-label">Library</div>
        <div class="dash-action-sub" id="dashLibSub">Browse recipes</div>
      </a>
    </div>
  </div>

</div>

<script>
(function () {

  // ── Greeting ───────────────────────────────────────────
  var h = new Date().getHours();
  document.getElementById('dashGreeting').textContent =
    h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
  document.getElementById('dashDate').textContent =
    new Date().toLocaleDateString('en-US', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  // ── Helpers ────────────────────────────────────────────
  var DAYS      = ['mon','tue','wed','thu','fri','sat','sun'];
  var DAY_SHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  var DAY_JS    = ['sun','mon','tue','wed','thu','fri','sat'];
  var WEEKLY_HREF = {
    'pasta-miso':        'recettes/pasta-miso.html',
    'bol-cereales':      'recettes/bol-cereales.html',
    'poulet-chou-savoie':'recettes/poulet-chou-savoie.html',
    'dal-lentilles':     'recettes/dal-lentilles.html',
    'perche-lac':        'recettes/perche-lac.html',
    'salade-betteraves': 'recettes/salade-betteraves.html',
    'shakshuka':         'recettes/shakshuka.html',
    'tarte-poireaux':    'recettes/tarte-poireaux.html',
    'veloute-choufleur': 'recettes/veloute-choufleur.html',
    'soupe-miso':        'recettes/soupe-miso.html',
    'salade-mache':      'recettes/salade-mache.html',
    'potage-carotte':    'recettes/potage-carotte.html'
  };

  function getMondayKey(date) {
    var d = new Date(date);
    var day = d.getDay();
    d.setDate(d.getDate() - day + (day === 0 ? -6 : 1));
    d.setHours(0,0,0,0);
    var y = d.getFullYear(), mo = d.getMonth()+1, da = d.getDate();
    return y+'-'+(mo<10?'0':'')+mo+'-'+(da<10?'0':'')+da;
  }

  function slotHref(slot) {
    if (!slot || !slot.recipeId) return null;
    if (WEEKLY_HREF[slot.recipeId]) return WEEKLY_HREF[slot.recipeId];
    // Any non-editorial recipe (custom, starter, etc.) → link to library by name
    return 'library.html?q=' + encodeURIComponent(slot.recipeName || '');
  }

  // ── Load plan ──────────────────────────────────────────
  var weekKey = getMondayKey(new Date());
  var plan = null;
  try { plan = JSON.parse(localStorage.getItem('weekPlan_'+weekKey)) || null; } catch(e) {}

  var todayKey = DAY_JS[new Date().getDay()];

  // ── Today's meals ──────────────────────────────────────
  var todayEl = document.getElementById('dashToday');
  if (plan && plan.slots) {
    var todayHtml = '';
    ['lunch','dinner'].forEach(function(meal) {
      var slot = plan.slots[todayKey+'-'+meal];
      var label = meal === 'lunch' ? 'Lunch' : 'Dinner';
      var href  = slotHref(slot);
      todayHtml +=
        '<div class="dash-today-slot">' +
          '<span class="dash-today-meal-type">' + label + '</span>' +
          (slot
            ? '<span class="dash-today-name">' + slot.recipeName + '</span>' +
              (href ? '<a href="' + href + '" class="dash-today-link">Recipe \u2197</a>' : '')
            : '<span class="dash-today-empty">Not planned</span>') +
        '</div>';
    });
    todayEl.innerHTML = todayHtml;
  } else {
    todayEl.innerHTML =
      '<div class="dash-today-slot">' +
        '<span class="dash-today-empty">No plan for this week yet.</span>' +
      '</div>';
  }

  // ── Week strip ─────────────────────────────────────────
  var weekEl = document.getElementById('dashWeek');
  if (plan && plan.slots) {
    var weekHtml = '<div class="dash-week-strip">';
    DAYS.forEach(function(d, di) {
      var isToday = d === todayKey;
      var lunch  = plan.slots[d+'-lunch'];
      var dinner = plan.slots[d+'-dinner'];
      var mealsHtml = '';
      if (!lunch && !dinner) {
        mealsHtml = '<span class="dash-week-meal-empty">\u2014</span>';
      } else {
        if (lunch) {
          var lh = slotHref(lunch);
          mealsHtml += '<span class="dash-week-meal">L\u00b7 ' + (lh ? '<a href="' + lh + '" class="dash-meal-link">' + lunch.recipeName + '</a>' : lunch.recipeName) + '</span>';
        }
        if (dinner) {
          var dh = slotHref(dinner);
          mealsHtml += '<span class="dash-week-meal">D\u00b7 ' + (dh ? '<a href="' + dh + '" class="dash-meal-link">' + dinner.recipeName + '</a>' : dinner.recipeName) + '</span>';
        }
      }
      weekHtml +=
        '<div class="dash-week-day' + (isToday ? ' dash-today-row' : '') + '">' +
          '<span class="dash-week-day-label">' + DAY_SHORT[di] + '</span>' +
          '<div class="dash-week-day-meals">' + mealsHtml + '</div>' +
        '</div>';
    });
    weekHtml += '</div>';
    weekEl.innerHTML = weekHtml;
  } else {
    weekEl.innerHTML =
      '<div class="dash-no-plan">' +
        '<p>No plan for this week yet.</p>' +
        '<a href="planner.html" class="btn btn-teal">Plan this week \u2192</a>' +
      '</div>';
  }

  // ── Quick link subtitles ───────────────────────────────
  if (plan && plan.slots) {
    var count = Object.values(plan.slots).filter(Boolean).length;
    var ps = document.getElementById('dashPlannerSub');
    if (ps) ps.textContent = count ? count + ' meal' + (count!==1?'s':'') + ' planned this week' : 'Build your week';
  }
  var recipeCount = typeof getSaved === 'function' ? getSaved().length : 0;
  var ls = document.getElementById('dashLibSub');
  if (ls && recipeCount) ls.textContent = recipeCount + ' recipe' + (recipeCount!==1?'s':'') + ' saved';

})();
</script>

</body>
</html>
